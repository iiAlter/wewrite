# WeWrite 配置示例
# 复制此文件为 config.yaml，填入真实值
# 推荐将敏感信息通过环境变量注入，避免明文密钥提交到 GitHub

# 微信公众号 API（发布草稿 + 数据统计必需）
wechat:
  appid: ""           # 环境变量: WEWRITE_WECHAT_APPID
  secret: ""           # 环境变量: WEWRITE_WECHAT_SECRET
  author: ""           # 默认署名（可选）

# AI 文本模型
llm:
  provider: "minimax"  # minimax | openai
  model: "MiniMax-M2.7"
  api_key: ""          # 环境变量: WEWRITE_LLM_API_KEY
  base_url: "https://api.minimaxi.com/anthropic"

# AI 图片生成
image:
  provider: "minimax"  # minimax | doubao | openai
  api_key: ""           # 环境变量: WEWRITE_IMAGE_API_KEY
  model: "image-01"
  base_url: "https://api.minimax.chat/v1"

# 默认排版主题
theme: "professional-clean"
